[client]
showErrorDetails = true

[logger]
level = "info"

[server]
# Deshabilitar el file watcher para evitar el error de inotify instance limit
fileWatcherType = "none"

[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
